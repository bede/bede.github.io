<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deacon-wasm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Roboto+Flex:opsz@8..144&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto Flex', system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .drop-zone { border: 2px dashed #aaa; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: #fff; margin-bottom: 1rem; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4a90d9; background: #f0f7ff; }
  .drop-zone.loaded { border-color: #4caf50; background: #f0fff0; }
  .drop-zone input { display: none; }
  .drop-zone .label { font-size: 0.95rem; color: #555; }
  .drop-zone .filename { font-weight: 600; color: #333; margin-top: 0.5rem; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .controls label { font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem; }
  .controls input[type="number"] { width: 5rem; padding: 0.25rem 0.4rem; border: 1px solid #ccc; }
  .actions { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 0.4rem; }
  button { background: #4a90d9; color: #fff; border: none; padding: 0.6rem 1.5rem; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
  button:hover:not(:disabled) { background: #3a7bc8; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #reset-btn { background: #6c757d; }
  #reset-btn:hover:not(:disabled) { background: #5b636a; }
  #status { margin-top: 1rem; padding: 0.8rem; background: #fff; font-size: 0.9rem; min-height: 2.5rem; border: 1px solid #ddd; white-space: pre-line; }
  #status.error { border-color: #e74c3c; color: #e74c3c; }
  .info { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }
  .download-link { margin-top: 0.6rem; }
  a { color: #333; text-decoration: underline; }
  a:hover { color: #000; }
</style>
</head>
<body>
<h1>deacon-wasm <span style="font-size: 0.5em; color: #713DA7; font-weight: normal; vertical-align: super;">alpha</span></h1>
<p class="subtitle"><a href="https://github.com/bede/deacon"></a><a href="https://github.com/bede/deacon">Deacon</a> in the browser. For human depletion, using the compact <a href="https://objectstorage.uk-london-1.oraclecloud.com/n/lrbvkel2wjot/b/human-genome-bucket/o/deacon/3/panhuman-1.k31w61.idx">panhuman-1 index</a> is recommended.</p>
<div class="drop-zone" id="index-zone">
  <input type="file" id="index-input" accept=".idx">
  <div class="label">Drop Deacon index (.idx), or click to select</div>
  <div class="filename" id="index-name"></div>
  <div class="info" id="index-info"></div>
</div>

<div class="drop-zone" id="reads-zone">
  <input type="file" id="reads-input" accept=".fastq,.fq,.fastq.gz,.fq.gz,.fasta,.fa,.fasta.gz,.fa.gz">
  <div class="label">Drop sequences (.fasta / .fastq[.gz]), or click to select</div>
  <div class="filename" id="reads-name"></div>
</div>

<div class="controls">
  <label><input type="radio" name="mode" value="search"> Search</label>
  <label><input type="radio" name="mode" value="deplete" checked> Deplete</label>
</div>
<div class="controls">
  <label>Absolute match threshold: <input type="number" id="abs-threshold" value="1" min="1"></label>
</div>
<div class="controls">
  <label>Relative match threshold: <input type="number" id="rel-threshold" value="0.1" min="0" max="1" step="0.01"></label>
</div>

<div class="actions">
  <button id="run-btn" disabled>Filter</button>
  <button id="reset-btn" type="button">Reset</button>
</div>

<div id="status"></div>
<div class="info download-link">
  Download compact panhuman index:
  <a href="https://objectstorage.uk-london-1.oraclecloud.com/n/lrbvkel2wjot/b/human-genome-bucket/o/deacon/3/panhuman-1.k31w61.idx">panhuman-1.k31w61.idx</a>
</div>

<script type="module">
  import { MSG, STAGE } from "./protocol.js?v=20260302-3";

  const ASSET_VERSION = "20260302-3";
  const worker = new Worker(`worker.js?v=${ASSET_VERSION}`, { type: "module" });
  const status = document.getElementById("status");

  let indexLoaded = false;
  let readsFile = null;
  let readsFilename = "";
  let isFiltering = false;
  let outputBytes = 0;
  let outputName = "";
  let outputFileStream = null;
  let outputWriteChain = Promise.resolve();
  let outputWriteError = null;
  let outputBlobParts = [];
  let outputFallbackReason = "";

  function setStatus(msg, isError) {
    status.textContent = msg;
    status.className = isError ? "error" : "";
  }

  function updateButton() {
    document.getElementById("run-btn").disabled = !(indexLoaded && readsFile) || isFiltering;
    document.getElementById("reset-btn").disabled = isFiltering;
  }

  function isGzipFilename(name) {
    return /\.(fastq|fq|fasta|fa)\.gz$/i.test(name || "");
  }

  function resetOutputState() {
    outputBytes = 0;
    outputName = "";
    outputFileStream = null;
    outputWriteChain = Promise.resolve();
    outputWriteError = null;
    outputBlobParts = [];
    outputFallbackReason = "";
  }

  async function prepareOutputSink() {
    resetOutputState();
    outputName = formatOutputName(readsFilename, isGzipFilename(readsFilename));
    if (!window.showSaveFilePicker) {
      return true;
    }
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: outputName });
      outputFileStream = await handle.createWritable();
      outputName = handle.name || outputName;
      return true;
    } catch (err) {
      if (err && err.name === "AbortError") return false;
      if (err && (err.name === "SecurityError" || err.name === "NotAllowedError")) {
        outputFallbackReason = "save picker blocked; buffering for final download";
        return true;
      }
      throw err;
    }
  }

  function queueOutputChunks(buffers) {
    if (!buffers || buffers.length === 0) return;
    const chunks = buffers.map((buffer) => new Uint8Array(buffer));
    for (const chunk of chunks) {
      outputBytes += chunk.byteLength;
    }
    if (outputFileStream) {
      outputWriteChain = outputWriteChain.then(async () => {
        if (outputWriteError) return;
        try {
          for (const chunk of chunks) {
            await outputFileStream.write(chunk);
          }
        } catch (err) {
          outputWriteError = err;
        }
      });
      return;
    }
    for (const chunk of chunks) {
      outputBlobParts.push(chunk);
    }
  }

  async function finalizeOutput() {
    await outputWriteChain;
    if (outputWriteError) throw outputWriteError;
    if (outputFileStream) {
      await outputFileStream.close();
      return;
    }
    const blob = new Blob(outputBlobParts, { type: "application/octet-stream" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = outputName;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function abortOutput() {
    try {
      await outputWriteChain;
    } catch (_) {}
    if (outputFileStream) {
      try {
        if (typeof outputFileStream.abort === "function") {
          await outputFileStream.abort();
        } else {
          await outputFileStream.close();
        }
      } catch (_) {}
    }
    resetOutputState();
  }

  function resetSelectionState() {
    indexLoaded = false;
    readsFile = null;
    readsFilename = "";

    const indexZone = document.getElementById("index-zone");
    const readsZone = document.getElementById("reads-zone");
    indexZone.classList.remove("loaded");
    readsZone.classList.remove("loaded");

    document.getElementById("index-name").textContent = "";
    document.getElementById("index-info").textContent = "";
    document.getElementById("reads-name").textContent = "";
    document.getElementById("index-input").value = "";
    document.getElementById("reads-input").value = "";

    updateButton();
  }

  function formatOutputName(name, compressed) {
    if (/\.fastq\.gz$/i.test(name)) {
      return name.replace(/\.fastq\.gz$/i, compressed ? ".filtered.fastq.gz" : ".filtered.fastq");
    }
    if (/\.fq\.gz$/i.test(name)) {
      return name.replace(/\.fq\.gz$/i, compressed ? ".filtered.fq.gz" : ".filtered.fq");
    }
    if (/\.fasta\.gz$/i.test(name)) {
      return name.replace(/\.fasta\.gz$/i, compressed ? ".filtered.fasta.gz" : ".filtered.fasta");
    }
    if (/\.fa\.gz$/i.test(name)) {
      return name.replace(/\.fa\.gz$/i, compressed ? ".filtered.fa.gz" : ".filtered.fa");
    }
    if (/\.fastq$/i.test(name)) {
      return name.replace(/\.fastq$/i, compressed ? ".filtered.fastq.gz" : ".filtered.fastq");
    }
    if (/\.fq$/i.test(name)) {
      return name.replace(/\.fq$/i, compressed ? ".filtered.fq.gz" : ".filtered.fq");
    }
    if (/\.fasta$/i.test(name)) {
      return name.replace(/\.fasta$/i, compressed ? ".filtered.fasta.gz" : ".filtered.fasta");
    }
    if (/\.fa$/i.test(name)) {
      return name.replace(/\.fa$/i, compressed ? ".filtered.fa.gz" : ".filtered.fa");
    }
    return compressed ? `${name}.filtered.gz` : `${name}.filtered`;
  }

  // Init WASM
  setStatus("Initializing WASM…");
  worker.postMessage({ type: MSG.INIT });

  worker.onmessage = async function (e) {
    const { type, info, message, chunks, stage, elapsed, stats, bytesProcessed, bytesTotal, progressCompressed } = e.data;

    if (type === MSG.READY) {
      setStatus("Load a Deacon index file to begin.");
    } else if (type === MSG.INDEX_LOADED) {
      indexLoaded = true;
      document.getElementById("index-zone").classList.add("loaded");
      document.getElementById("index-info").textContent = info;
      setStatus("Index loaded. Now load reads to filter.");
      updateButton();
    } else if (type === MSG.PROGRESS) {
      const processedMB = (Number(bytesProcessed || 0) / 1024 / 1024).toFixed(0);
      if (bytesTotal && bytesTotal > 0) {
        const totalMB = (bytesTotal / 1024 / 1024).toFixed(0);
        const pct = ((bytesProcessed / bytesTotal) * 100).toFixed(0);
        setStatus(`Filtering… ${processedMB}/${totalMB} MB (${pct}%)`);
      } else if (progressCompressed) {
        setStatus(`Filtering… ${processedMB} MB`);
      } else {
        setStatus(`Filtering… ${processedMB} MB decompressed`);
      }
    } else if (type === MSG.STAGE) {
      if (stage === STAGE.FINALIZING) {
        setStatus("Finalizing output…");
      }
    } else if (type === MSG.OUTPUT_CHUNK_BATCH) {
      queueOutputChunks(chunks);
    } else if (type === MSG.FILTERED_DONE) {
      isFiltering = false;
      try {
        await finalizeOutput();
      } catch (err) {
        await abortOutput();
        setStatus("Error finalizing output: " + err.message, true);
        updateButton();
        return;
      }
      const sizeMB = (outputBytes / 1024 / 1024).toFixed(1);
      const elapsedSec = Number(elapsed) || 0;
      const readsIn = Number(stats?.readsIn || 0);
      const readsOut = Number(stats?.readsOut || 0);
      const basesIn = Number(stats?.basesIn || 0);
      const basesOut = Number(stats?.basesOut || 0);
      const readsPct = readsIn > 0 ? ((readsOut / readsIn) * 100).toFixed(2) : "0.00";
      const basesPct = basesIn > 0 ? ((basesOut / basesIn) * 100).toFixed(2) : "0.00";
      const mbpPerSec = elapsedSec > 0 ? (basesIn / 1_000_000 / elapsedSec).toFixed(2) : "0.00";

      let processedLine = "";
      if (bytesTotal && bytesTotal > 0) {
        const totalMB = (bytesTotal / 1024 / 1024).toFixed(1);
        const processedMB = (Number(bytesProcessed || 0) / 1024 / 1024).toFixed(1);
        processedLine = `Input processed: ${processedMB}/${totalMB} MB\n`;
      } else if (bytesProcessed) {
        const processedMB = (Number(bytesProcessed || 0) / 1024 / 1024).toFixed(1);
        processedLine = `Input processed: ${processedMB} MB decompressed\n`;
      }

      setStatus(
        `Completed in ${elapsed}s (${mbpPerSec} Mbp/s)\n` +
        processedLine +
        `Sequences retained: ${readsOut.toLocaleString()}/${readsIn.toLocaleString()} (${readsPct}%)\n` +
        `Bases retained: ${basesOut.toLocaleString()}/${basesIn.toLocaleString()} (${basesPct}%)\n` +
        `Output file size: ${sizeMB} MB\n` +
        (outputFileStream ? "Output written to selected file." : "Output downloaded.")
      );
      resetOutputState();
      updateButton();
    } else if (type === MSG.ERROR) {
      isFiltering = false;
      await abortOutput();
      setStatus("Error: " + message, true);
      updateButton();
    } else if (type === MSG.RESET_DONE) {
      setStatus("Reset. Load an index file to begin.");
    }
  };

  function setupDropZone(zoneId, inputId, onFile) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);

    zone.addEventListener("click", () => input.click());
    zone.addEventListener("dragover", (e) => { e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) onFile(e.dataTransfer.files[0]);
    });
    input.addEventListener("change", () => { if (input.files.length > 0) onFile(input.files[0]); });
  }

  setupDropZone("index-zone", "index-input", async (file) => {
    const MAX_INDEX_BYTES = 1024 * 1024 * 1024; // 1 GB
    if (file.size > MAX_INDEX_BYTES) {
      setStatus(`Index file too large for browser use (${(file.size / 1024 / 1024).toFixed(0)} MB). Maximum supported size is ${MAX_INDEX_BYTES / 1024 / 1024 / 1024} GB.`, true);
      return;
    }
    document.getElementById("index-name").textContent = file.name;
    document.getElementById("index-info").textContent = "Loading…";
    setStatus("Loading index (" + (file.size / 1024 / 1024).toFixed(0) + " MB)…");
    const buf = await file.arrayBuffer();
    worker.postMessage({ type: MSG.LOAD_INDEX, data: buf }, [buf]);
  });

  setupDropZone("reads-zone", "reads-input", (file) => {
    readsFile = file;
    readsFilename = file.name;
    document.getElementById("reads-name").textContent = file.name + " (" + (file.size / 1024 / 1024).toFixed(1) + " MB)";
    document.getElementById("reads-zone").classList.add("loaded");
    updateButton();
  });

  document.getElementById("run-btn").addEventListener("click", async () => {
    if (!readsFile) return;

    try {
      const ok = await prepareOutputSink();
      if (!ok) {
        setStatus("Filtering cancelled.");
        return;
      }
    } catch (err) {
      setStatus("Error preparing output file: " + err.message, true);
      return;
    }

    isFiltering = true;
    updateButton();
    if (!outputFileStream) {
      const reason = outputFallbackReason || "browser fallback mode: buffering for final download";
      setStatus(`Filtering… (${reason})`);
    } else {
      setStatus("Filtering…");
    }

    worker.postMessage({
      type: MSG.FILTER,
      data: {
        file: readsFile,
        deplete: document.querySelector('input[name="mode"]:checked').value === "deplete",
        absThreshold: parseInt(document.getElementById("abs-threshold").value) || 2,
        relThreshold: parseFloat(document.getElementById("rel-threshold").value) || 0.1,
      }
    });
  });

  document.getElementById("reset-btn").addEventListener("click", () => {
    if (isFiltering) return;
    resetSelectionState();
    resetOutputState();
    worker.postMessage({ type: MSG.RESET });
  });
</script>
</body>
</html>
