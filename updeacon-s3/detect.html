<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>updeacon-check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #6d4fd8; --mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace; }
  body { font-family: 'Geist', system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 400; margin-bottom: 1.25rem; }
  .beta-tag { color: #713da7; font-size: 0.5em; font-weight: 400; vertical-align: super; }
  .drop-zone { border: 1px dashed #aaa; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: #fff; margin-bottom: 1rem; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #713da7; background: #f6effd; }
  .drop-zone.loaded { border-color: #4caf50; background: #f0fff0; }
  .drop-zone.busy { cursor: progress; opacity: 0.7; }
  .drop-zone input { display: none; }
  .drop-zone .label { font-size: 0.95rem; color: #555; }
  .drop-zone .summary { font-weight: 600; color: #333; margin-top: 0.5rem; }
  .drop-zone .summary:empty { display: none; }
  #status { margin-bottom: 1rem; padding: 0.8rem; background: #fff; font-size: 0.9rem; min-height: 2.5rem; border: 1px solid #ddd; white-space: pre-line; line-height: 1.5; }
  #status.error, #status.high-host { color: #e74c3c; }
  #status.success { color: #4caf50; }
</style>
</head>
<body>
<h1>updeacon-check <span class="beta-tag"></span></h1>

<div class="drop-zone" id="drop-zone">
  <input type="file" id="file-input" accept=".fastq,.fq,.fasta,.fa,.gz" multiple>
  <div class="label">Drop a fasta/fastq[.gz] file or pair, or click to select.</div>
  <div class="summary" id="drop-summary"></div>
</div>

<div id="status"></div>

<script type="module" src="./detect.js"></script>
</body>
</html>
