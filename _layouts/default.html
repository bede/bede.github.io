---
layout: compress
---
<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Roboto+Flex:opsz@8..144&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/github.css">
    <link rel="icon" href="/images/favicon.ico"><!-- 32×32 -->
    <link rel="icon" href="/images/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/images/180.png"><!-- 180×180 -->
    <link rel="manifest" href="/images/manifest.webmanifest">
    <script>
      /* Set theme before first paint to avoid a flash of the wrong theme. */
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved ? saved === 'dark'
                           : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="main">
      <h1 class="logo"><a href="{{site.baseurl}}/"><img src="{{site.baseurl}}/images/icon.svg" width="32" height="32"></a></h1>
      <ul class="navigation">
        <li><a href="{{site.baseurl}}/">posts</a></li>
        <li><a href="{{site.baseurl}}/about">about</a></li>
        <!-- <li><a href="{{site.baseurl}}/contact/">Contact</a></li> -->
        <li>
          <button type="button" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
        </li>
      </ul>
    </header>
    {{ content }}
    <div class="breaker"></div>
    <footer>
      <a href="{{site.baseurl}}/about">about</a></p>
    </footer>
    {% include analytics.html %}
    <script src="{{site.baseurl}}/js/theme.min.js"></script>
  </body>
</html>
